<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>2048</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <div class="brand">
          <h1>2048</h1>
          <p>合并相同数字，冲击 2048。</p>
        </div>
        <div class="scores">
          <div class="score-card">
            <div class="label">SCORE</div>
            <div id="score" class="value">0</div>
          </div>
          <div class="score-card">
            <div class="label">BEST</div>
            <div id="best" class="value">0</div>
          </div>
        </div>
      </header>

      <section class="board-wrap">
        <div id="board" class="board" role="grid" aria-label="2048 board"></div>
        <div id="overlay" class="overlay hidden" aria-live="polite">
          <div class="overlay-card">
            <div id="overlay-title" class="overlay-title">Game Over</div>
            <div id="overlay-sub" class="overlay-sub">再试一次？</div>
            <button id="restart" class="btn">Restart</button>
          </div>
        </div>
      </section>

      <section class="controls">
        <button id="newgame" class="btn ghost">New Game</button>
        <button id="undo" class="btn ghost">Undo</button>
        <div class="hint">方向键或滑动手势</div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
